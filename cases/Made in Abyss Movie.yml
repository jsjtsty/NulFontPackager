version: 1

fonts:
  # 设置字体搜索路径，包含番剧自带字体包及 Mac 系统路径
  workspaces:
    - '/Volumes/T7S-Personal/ACG/Animations/Made in Abyss Movie/Fonts'
    - '/Library/Fonts'
    - '/Users/nullsty/Library/Fonts'

process:
  # 视频和字幕文件所在的根目录
  workspace: '/Volumes/T7S-Personal/ACG/Animations/Made in Abyss Movie'
